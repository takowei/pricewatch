version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricewatch
      POSTGRES_USER: pricewatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricewatch -d pricewatch"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://pricewatch:${POSTGRES_PASSWORD:-changeme}@postgres:5432/pricewatch
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations then start app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

volumes:
  pgdata:
